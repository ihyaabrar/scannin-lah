<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background: white rounded square -->
  <rect width="512" height="512" rx="110" fill="#ffffff"/>
  <rect width="512" height="512" rx="110" fill="none" stroke="#e2e8f0" stroke-width="4"/>

  <!-- Document body -->
  <rect x="120" y="80" width="190" height="240" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="3"/>
  <!-- Folded corner -->
  <polygon points="270,80 310,120 270,120" fill="#e2e8f0"/>
  <!-- Doc lines -->
  <rect x="144" y="148" width="110" height="8" rx="4" fill="#cbd5e1"/>
  <rect x="144" y="170" width="138" height="8" rx="4" fill="#e2e8f0"/>
  <rect x="144" y="192" width="95"  height="8" rx="4" fill="#e2e8f0"/>
  <rect x="144" y="214" width="125" height="8" rx="4" fill="#e2e8f0"/>
  <rect x="144" y="236" width="80"  height="8" rx="4" fill="#e2e8f0"/>

  <!-- Scan frame (bottom-right, overlapping doc) -->
  <g stroke="url(#scanGrad)" stroke-width="11" stroke-linecap="round" fill="none">
    <path d="M258 272 L258 252 L278 252"/>
    <path d="M368 272 L368 252 L348 252"/>
    <path d="M258 372 L258 392 L278 392"/>
    <path d="M368 372 L368 392 L348 392"/>
  </g>
  <!-- Scan line -->
  <rect x="262" y="320" width="102" height="5" rx="2.5" fill="url(#scanGrad)" opacity="0.6"/>

  <!-- App name: single line, centered, below elements -->
  <text
    x="256"
    y="460"
    font-family="Inter, Helvetica Neue, Arial, sans-serif"
    font-size="58"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="-2"
  >
    <tspan fill="#1e293b">Scanin</tspan><tspan fill="url(#scanGrad)"> Lah</tspan>
  </text>
</svg>
