<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <linearGradient id="splashBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="60%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="splashAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="splashDoc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" style="stop-color:#e2e8f0" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#22d3ee" stop-opacity="0.12"/>
      <stop offset="100%" style="stop-color:#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#818cf8" stop-opacity="0.10"/>
      <stop offset="100%" style="stop-color:#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#splashBg)"/>
  <rect width="390" height="844" fill="url(#glow1)"/>
  <rect width="390" height="844" fill="url(#glow2)"/>

  <!-- Decorative rings -->
  <circle cx="195" cy="380" r="200" stroke="#22d3ee" stroke-width="0.5" fill="none" opacity="0.12"/>
  <circle cx="195" cy="380" r="160" stroke="#818cf8" stroke-width="0.5" fill="none" opacity="0.10"/>
  <circle cx="195" cy="380" r="120" stroke="#22d3ee" stroke-width="0.5" fill="none" opacity="0.08"/>

  <!-- Document -->
  <rect x="120" y="260" width="130" height="165" rx="14" fill="url(#splashDoc)"/>
  <path d="M210 260 L250 300 L210 300 Z" fill="#94a3b8" opacity="0.5"/>
  <rect x="138" y="315" width="80" height="6" rx="3" fill="#94a3b8" opacity="0.5"/>
  <rect x="138" y="330" width="95" height="6" rx="3" fill="#94a3b8" opacity="0.35"/>
  <rect x="138" y="345" width="68" height="6" rx="3" fill="#94a3b8" opacity="0.35"/>
  <rect x="138" y="360" width="88" height="6" rx="3" fill="#94a3b8" opacity="0.25"/>

  <!-- AI circle -->
  <circle cx="268" cy="400" r="52" fill="#0f172a"/>
  <circle cx="268" cy="400" r="52" fill="url(#splashAccent)" opacity="0.12"/>
  <circle cx="268" cy="400" r="44" stroke="url(#splashAccent)" stroke-width="2" fill="none"/>
  <!-- AI spark -->
  <circle cx="268" cy="400" r="8" fill="url(#splashAccent)"/>
  <line x1="268" y1="379" x2="268" y2="390" stroke="url(#splashAccent)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="268" y1="410" x2="268" y2="421" stroke="url(#splashAccent)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="247" y1="400" x2="258" y2="400" stroke="url(#splashAccent)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="278" y1="400" x2="289" y2="400" stroke="url(#splashAccent)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="253" y1="385" x2="260" y2="392" stroke="url(#splashAccent)" stroke-width="2" stroke-linecap="round"/>
  <line x1="276" y1="408" x2="283" y2="415" stroke="url(#splashAccent)" stroke-width="2" stroke-linecap="round"/>
  <line x1="283" y1="385" x2="276" y2="392" stroke="url(#splashAccent)" stroke-width="2" stroke-linecap="round"/>
  <line x1="260" y1="408" x2="253" y2="415" stroke="url(#splashAccent)" stroke-width="2" stroke-linecap="round"/>

  <!-- App name -->
  <text x="195" y="490" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">Doc<tspan fill="url(#splashAccent)">AI</tspan></text>

  <!-- Tagline -->
  <text x="195" y="520" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="500" fill="#64748b" text-anchor="middle" letter-spacing="0.5">Asisten Dokumen Pintar</text>

  <!-- Loading dots -->
  <circle cx="181" cy="570" r="4" fill="#22d3ee" opacity="0.9"/>
  <circle cx="195" cy="570" r="4" fill="#818cf8" opacity="0.6"/>
  <circle cx="209" cy="570" r="4" fill="#22d3ee" opacity="0.3"/>
</svg>
